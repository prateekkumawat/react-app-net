name: Deploy Backend to Azure Web App

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/Api/Api.csproj

      - name: Build
        run: dotnet build backend/Api/Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/Api/Api.csproj --configuration Release --output publish/backend --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: YOUR_BACKEND_WEBAPP
          publish-profile: ${{ secrets.AZURE_WEBAPP_BACKEND_PUBLISH_PROFILE }}
          package: publish/backend